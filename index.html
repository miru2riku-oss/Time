<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRC Studio Pro: High-Quality Exporter</title>
    <style>
        :root {
            --wrc-orange: #FF4D00;
            --bg-opacity: 0.98;
            --wrc-navy: rgba(5, 15, 35, var(--bg-opacity));
            --wrc-row-bg: rgba(0, 5, 15, var(--bg-opacity));
            --wipe-speed: 0.55s;
            --wrc-bezier: cubic-bezier(0.1, 0.9, 0.2, 1);
            --canvas-w: 1920px;
            --canvas-h: 1080px;
            --preview-scale: 1;
            --ui-scale: 1.0;
            --base-w: 1350px;
            --base-h: 720px;
            --font-main: 3.2rem;
            --font-row: 1.3rem;
        }

        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
        body { 
            margin: 0; background: #000; color: white; display: flex; height: 100vh; width: 100vw; 
            overflow: hidden; font-family: 'Arial Black', sans-serif;
        }

        /* 録画中のマウスカーソル消去 */
        body.rec-mode .dynamic-canvas { cursor: none; }

        /* --- Editor Panel --- */
        #editor-panel {
            width: 420px; height: 100vh; background: #1a1a1a; border-right: 2px solid #333;
            display: flex; flex-direction: column; z-index: 1000; transition: transform 0.4s; flex-shrink: 0;
        }
        body.rec-mode #editor-panel { transform: translateX(-100%); position: absolute; }
        .editor-content-scroll { flex-grow: 1; overflow-y: auto; padding: 20px; }
        
        /* --- Display System --- */
        .main-display-container {
            flex-grow: 1; height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: #0a0a0a; overflow: hidden; position: relative;
        }
        .dynamic-canvas {
            width: var(--canvas-w); height: var(--canvas-h);
            background: #000; position: relative; overflow: hidden;
            transform: scale(var(--preview-scale)); transform-origin: center center;
            flex-shrink: 0;
        }

        /* --- WRC UI (Animation core) --- */
        .wrc-viewport { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(var(--ui-scale));
            transform-origin: center center;
            z-index: 10; width: var(--base-w); height: var(--base-h); 
            display: none; opacity: 0;
        }
        .wrc-viewport.visible { opacity: 1; }
        .wrc-outer-frame {
            background: var(--wrc-navy); border-left: 18px solid var(--wrc-orange); width: 100%; height: 100%;
            display: flex; flex-direction: column;
        }
        .wrc-viewport.fade-out-bg .wrc-outer-frame { opacity: 0; transition: opacity 0.5s ease; }
        .header-fixed-area { flex-shrink: 0; padding: 40px 50px 0 50px; }
        .scrollable-content-area { flex-grow: 1; overflow: hidden; padding: 0 50px 40px 50px; position: relative; }
        .schedule-container { display: flex; flex-direction: column; gap: 8px; transition: transform 0.8s var(--wrc-bezier); }

        .row { position: relative; height: 50px; overflow: hidden; }
        .row.header { height: 125px; margin-bottom: 25px; }
        .row.day-separator { height: 38px; margin-top: 15px; }
        .wipe-bar { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--wrc-orange); z-index: 30; transform: translate3d(-105%, 0, 0); }
        .header .wipe-bar { background: #fff; }
        .content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--wrc-row-bg); display: flex; align-items: center; padding: 0 45px; z-index: 20; clip-path: inset(0 100% 0 0); }
        .header .content { background: var(--wrc-orange); flex-direction: column; justify-content: center; text-align: center; }

        .anim-in .wipe-bar { animation: wipe-in-anim var(--wipe-speed) var(--wrc-bezier) both; animation-delay: var(--in-delay); }
        .anim-in .content { animation: content-show var(--wipe-speed) var(--wrc-bezier) both; animation-delay: var(--in-delay); }
        .anim-out .wipe-bar { animation: wipe-out-anim var(--wipe-speed) var(--wrc-bezier) both; animation-delay: var(--out-delay); }
        .anim-out .content { animation: content-hide var(--wipe-speed) var(--wrc-bezier) both; animation-delay: var(--out-delay); }

        @keyframes wipe-in-anim { 0% { transform: translate3d(-105%, 0, 0); } 100% { transform: translate3d(105%, 0, 0); } }
        @keyframes wipe-out-anim { 0% { transform: translate3d(-105%, 0, 0); } 100% { transform: translate3d(105%, 0, 0); } }
        @keyframes content-show { 0% { clip-path: inset(0 100% 0 0); } 100% { clip-path: inset(0 0% 0 0); } }
        @keyframes content-hide { 0% { clip-path: inset(0 0% 0 0); } 100% { clip-path: inset(0 0% 0 100%); } }

        /* UI elements */
        .editor-section { margin-bottom: 12px; background: #2a2a2a; padding: 10px; border-radius: 6px; }
        input[type="text"], input[type="number"] { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 8px; margin-top: 5px; border-radius: 4px; font-size: 13px; }
        .rec-btn { background: #d00; width: 100%; border: none; color: white; font-weight: bold; padding: 15px; border-radius: 4px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .rec-btn:hover { background: #ff0000; }
        .play-btn { background: var(--wrc-orange); padding: 12px 40px; color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .floating-controls { position: fixed; bottom: 30px; right: 40px; z-index: 5000; }
        body.rec-mode .floating-controls { display: none; }
    </style>
</head>
<body class="mode-hd">

    <div id="editor-panel">
        <div style="padding:20px; border-bottom:1px solid #333;"><h2 style="margin:0; color:var(--wrc-orange); font-size:1.1rem;">WRC EXPORTER PRO</h2></div>
        <div class="editor-content-scroll">
            <div class="editor-section">
                <label style="font-size: 10px; color: #aaa; font-weight: bold;">RALLY TITLE</label>
                <input type="text" id="in-title" value="WRC RALLY SWEDEN" oninput="updatePreview()">
            </div>
            <div id="rows-editor"></div>
            <button style="background:var(--wrc-orange); width:100%; border:none; color:white; padding:10px; border-radius:4px; font-size:11px; font-weight:bold; cursor:pointer;" onclick="addRow('stage')">+ ADD STAGE</button>
        </div>
        <div style="padding:20px; background:#111; border-top:1px solid #333;">
            <button class="rec-btn" onclick="masterExport()">🔴 START CLEAN EXPORT (MP4)</button>
            <p style="font-size: 9px; color: #888; margin-top: 10px; line-height: 1.4;">
                【重要】<br>
                1. 許可後、**「このタブ」**を選択してください。<br>
                2. 録画は自動で全画面になり、終了後にMP4が保存されます。
            </p>
        </div>
    </div>

    <div class="main-display-container">
        <div class="dynamic-canvas" id="canvas-area">
            <video id="bg-video" loop muted playsinline style="position:absolute; width:100%; height:100%; object-fit:cover; display:none;"></video>
            <div style="position:absolute; width:100%; height:100%; background:rgba(0,0,0,0.3);"></div>
            <div class="wrc-viewport" id="viewport">
                <div class="wrc-outer-frame">
                    <div class="header-fixed-area" id="header-root"></div>
                    <div class="scrollable-content-area"><div class="schedule-container" id="ui-root"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="floating-controls"><button class="play-btn" onclick="toggleUI()">PREVIEW</button></div>
    <audio id="audio-player"></audio>

    <script>
        let data = [{ type: 'day', text: 'FRIDAY 16 FEB' },{ type: 'stage', day: "08:58", time: "Brattby 1" }];
        const canvas = document.getElementById('canvas-area');
        const audio = document.getElementById('audio-player');
        const viewport = document.getElementById('viewport');
        const uiRoot = document.getElementById('ui-root');
        let isVisible = false;

        async function masterExport() {
            try {
                // 1. 全画面化（ブラウザのUIを隠す）
                if (canvas.requestFullscreen) { await canvas.requestFullscreen(); }

                // 2. 録画ストリーム取得
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { 
                        frameRate: 60,
                        width: 1920,
                        height: 1080,
                        displaySurface: "browser" 
                    },
                    audio: true
                });

                document.body.classList.add('rec-mode');

                // 3. メディアレコーダー（高ビットレート設定 15Mbps）
                const options = { 
                    mimeType: 'video/webm;codecs=vp9',
                    videoBitsPerSecond: 15000000 
                };
                const recorder = new MediaRecorder(stream, options);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `${document.getElementById('in-title').value}_Master.mp4`;
                    a.click();
                    if (document.exitFullscreen) document.exitFullscreen();
                    document.body.classList.remove('rec-mode');
                };

                recorder.start();

                // 4. アニメーション開始
                await new Promise(r => setTimeout(r, 1000));
                toggleUI(); // 入場

                // スクロール処理
                const scrollArea = document.querySelector('.scrollable-content-area');
                await new Promise(r => setTimeout(r, 3000));
                const max = Math.max(0, uiRoot.scrollHeight - scrollArea.clientHeight);
                if(max > 0) {
                    uiRoot.style.transform = `translateY(-${max}px)`;
                    await new Promise(r => setTimeout(r, 5000));
                } else {
                    await new Promise(r => setTimeout(r, 3000));
                }

                toggleUI(); // 退場
                await new Promise(r => setTimeout(r, 3000));

                recorder.stop();
                stream.getTracks().forEach(t => t.stop());

            } catch (err) {
                console.error(err);
                if (document.exitFullscreen) document.exitFullscreen();
                document.body.classList.remove('rec-mode');
            }
        }

        // --- 以下、既存のUI管理ロジック ---
        function toggleUI() {
            const rows = document.querySelectorAll('.row');
            if(!isVisible) {
                isVisible = true; viewport.style.display = 'block';
                setTimeout(() => {
                    viewport.classList.add('visible');
                    rows.forEach((r, i) => { r.classList.add('anim-in'); r.style.setProperty('--in-delay', `${i * 0.08}s`); });
                }, 10);
                if(audio.src) { audio.volume = 0; audio.play(); fadeAudio(1); }
            } else {
                isVisible = false; viewport.classList.add('fade-out-bg');
                rows.forEach((r, i) => { r.classList.replace('anim-in', 'anim-out'); r.style.setProperty('--out-delay', `${i * 0.05}s`); });
                fadeAudio(0, () => audio.pause());
                setTimeout(() => {
                    viewport.style.display = 'none'; viewport.classList.remove('visible', 'fade-out-bg');
                    uiRoot.style.transform = 'translateY(0)';
                    rows.forEach(r => r.classList.remove('anim-out'));
                }, 2500);
            }
        }

        function fadeAudio(target, cb) {
            let curr = audio.volume;
            const interval = setInterval(() => {
                if (target > curr) { curr = Math.min(target, curr + 0.02); }
                else { curr = Math.max(target, curr - 0.02); }
                audio.volume = curr;
                if (curr === target) { clearInterval(interval); if(cb) cb(); }
            }, 30);
        }

        function updatePreview() {
            const title = document.getElementById('in-title').value;
            headerRoot.innerHTML = `<div class="row header"><div class="wipe-bar"></div><div class="content"><div style="font-size:var(--font-main);">${title}</div><div style="font-size:0.9rem; letter-spacing:5px;">SCHEDULE</div></div></div>`;
            uiRoot.innerHTML = data.map(item => `<div class="row ${item.type === 'day' ? 'day-separator' : ''}"><div class="wipe-bar"></div><div class="content">
                ${item.type === 'day' ? `<span style="font-size:0.9rem; color:#aaa;">${item.text}</span>` : 
                `<span style="color:var(--wrc-orange); width:110px;">${item.day}</span><span>${item.time}</span>`}</div></div>`).join('');
        }

        function addRow(t) { data.push({type:'stage', day:'00:00', time:'New Stage'}); buildEditor(); updatePreview(); }
        function buildEditor() {
            const root = document.getElementById('rows-editor');
            root.innerHTML = data.map((item, i) => `<div class="editor-section">
                <input type="text" value="${item.time}" oninput="data[${i}].time=this.value;updatePreview()">
                <button onclick="data.splice(${i},1);buildEditor();updatePreview()" style="margin-top:5px; width:100%; font-size:9px; background:#444; color:#fff; border:none; cursor:pointer;">DELETE</button>
            </div>`).join('');
        }

        window.onload = () => { updatePreview(); buildEditor(); };
    </script>
</body>
</html>
